name = "dl-siski-ai"
main = "anthropic-proxy.js"
compatibility_date = "2024-11-01"

# Free built-in Cloudflare AI (Llama). No key, no card. Used by default.
[ai]
binding = "AI"

# Optional cost-control / quality vars (set in the dashboard or here):
# [vars]
# ALLOWED_ORIGIN = "https://your-app-domain"
# MAX_TOKENS = "1024"
# DAILY_CAP = "2000"      # needs the KV namespace below

# Optional: for the daily cap, create a KV namespace and bind it as RL:
# [[kv_namespaces]]
# binding = "RL"
# id = "<your-kv-namespace-id>"
