<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dl. Siski — Fitness Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4AA;</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Backgrounds — deep slate */
  --bg:#08090e;--bg1:#0f1018;--bg2:#161824;--bg3:#1c1f2e;--bd:#272b40;
  /* Text — high contrast */
  --tx1:#f2f4ff;--tx2:#9aa4c4;--tx2b:#b4bcda;--tx3:#828dba;--tx4:#646e9e;--tx5:#525d8a;
  /* Accent: electric blue */
  --ac:#4f7ef7;--ac-h:#3b6ef0;--ac-l:#93b4fc;--ac-glow:rgba(79,126,247,.18);
  /* Semantic */
  --or:#f97316;--or-l:#fb923c;
  --su:#34d399;
  --wa:#fbbf24;
  --er:#f87171;
  --in:#38bdf8;
  --fu:#e879f9;
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg1:#ffffff;--bg2:#e4eaff;--bg3:#ccd6fa;--bd:#93b4fc55;
  --tx1:#0a1128;--tx2:#1e3060;--tx2b:#2a4490;--tx3:#34539e;--tx4:#3f63c4;--tx5:#5e80cf;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx1);font-family:'Noto Sans',Segoe UI,Roboto,ui-sans-serif,system-ui,sans-serif;font-size:14px}
#app{min-height:100dvh;background:var(--bg)}
.wrap{display:flex;height:100dvh;overflow:hidden}
.sb{width:172px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--bg1);display:flex;flex-direction:column;transition:width .18s ease}
.sb-h{padding:11px 10px;border-bottom:1px solid var(--bg1);display:flex;align-items:center;gap:7px}
.lb{width:25px;height:25px;border-radius:7px;background:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-n{flex:1;padding:5px 4px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;border:none;background:none;color:var(--tx3);font-size:13px;font-weight:500;width:100%;text-align:left;font-family:inherit;transition:background .13s,color .13s;position:relative}
.ni:hover{background:var(--bg2);color:var(--tx3)}
.ni.act{background:var(--ac-glow);color:var(--ac-l)}
.ni.act::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2.5px;border-radius:99px;background:var(--ac)}
.sb-f{padding:5px 4px;border-top:1px solid var(--bg1)}
.uc{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;cursor:pointer;transition:background .13s}
.uc:hover{background:var(--bg2)}
.mc{flex:1;overflow-y:auto;min-width:0}
.sec{padding:14px;display:flex;flex-direction:column;gap:10px;animation:pageIn .18s ease both}
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;transition:transform .15s ease,box-shadow .15s ease}
.card:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(45,106,79,.10)}
.cp{padding:13px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:7px 11px;color:var(--tx1);font-size:12px;outline:none;font-family:inherit;box-sizing:border-box;transition:border-color .13s}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:var(--tx5)}
.inp-err{border-color:var(--er) !important;background:rgba(248,113,113,.05) !important}
input[type="number"].inp::-webkit-outer-spin-button,input[type="number"].inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type="number"].inp{-moz-appearance:textfield}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all .12s ease}
.btn:active{transform:scale(.96)}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--ac-h)}.bp:disabled{opacity:.35;cursor:not-allowed}
.bg{background:none;border:1px solid var(--bg3);color:var(--tx3)}.bg:hover{border-color:var(--tx4);color:var(--tx1)}
.bw{width:100%}
.ob2{background:var(--bg2);border:2px solid var(--bg3);border-radius:8px;padding:7px 11px;cursor:pointer;text-align:left;color:var(--tx2);font-size:12px;font-weight:500;font-family:inherit;width:100%;transition:all .13s}
.ob2.sel{border-color:var(--ac);background:var(--ac-glow);color:var(--ac-l)}
.bar{height:5px;background:var(--bg2);border-radius:99px;overflow:hidden}
.bf{height:100%;border-radius:99px;animation:barFill .6s cubic-bezier(.4,0,.2,1) both}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.g2>*,.g3>*,.g4>*{animation:slideUp .2s ease both}
.g2>*:nth-child(2),.g3>*:nth-child(2),.g4>*:nth-child(2){animation-delay:.05s}
.g2>*:nth-child(3),.g3>*:nth-child(3),.g4>*:nth-child(3){animation-delay:.1s}
.g2>*:nth-child(4),.g3>*:nth-child(4),.g4>*:nth-child(4){animation-delay:.15s}
.iw{position:relative}
.iu{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--tx4);font-size:10px;pointer-events:none}
.ob{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:14px}
.oc{width:100%;max-width:410px}
.opr{display:flex;gap:3px;margin-bottom:13px}
.opb{height:3px;flex:1;border-radius:99px;background:var(--bg2);transition:background .3s}
.opb.dn{background:var(--ac-l)}
.ofrm{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:18px}
.tg{display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:2px;border:1px solid var(--bd)}
.tb{padding:8px 18px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:var(--tx3);transition:all .15s;letter-spacing:.01em}
.tb.ac{background:var(--bg3);color:var(--tx1);box-shadow:0 1px 6px rgba(0,0,0,.3)}
.ach{border-radius:10px;padding:11px;display:flex;align-items:flex-start;gap:9px;border:1px solid}
.ach.lk{border-color:var(--bd);background:var(--bg1);opacity:.45}
.ach.ul{border-color:var(--wa);background:rgba(251,191,36,.06)}
.chal{border-radius:9px;padding:10px;border:1px solid var(--bd);background:var(--bg1);transition:border-color .15s}
.chal.done{border-color:var(--su);background:rgba(52,211,153,.05)}
.fi{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:6px;cursor:pointer;transition:border-color .12s}
.fi:hover{border-color:var(--tx4)}
.cm{display:flex;margin-bottom:7px}
.cm.u{justify-content:flex-end}
.cb{max-width:84%;padding:8px 11px;border-radius:11px;font-size:12px;line-height:1.5;white-space:pre-wrap}
.cb.u{background:var(--ac);color:#fff;border-bottom-right-radius:2px}
.cb.a{background:var(--bg1);border:1px solid var(--bd);color:var(--tx2);border-bottom-left-radius:2px}
.ci{flex:1;background:var(--bg1);border:1px solid var(--bg3);border-radius:8px;padding:8px 11px;color:var(--tx1);font-size:12px;outline:none;font-family:inherit;transition:border-color .13s}
.ci:focus{border-color:var(--ac)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ac-l);display:inline-block;animation:bn 1s infinite ease}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
.wqb{padding:5px 9px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);cursor:pointer;font-size:10px;font-family:inherit;color:var(--in);font-weight:500;transition:all .12s}
.wqb:hover{border-color:var(--in);background:rgba(56,189,248,.07)}
.qbtn{padding:6px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:7px;cursor:pointer;text-align:left;color:var(--tx2);font-size:10px;font-family:inherit;transition:background .12s,color .12s,border-color .12s}
.qbtn:hover{background:var(--bg3);color:var(--tx1);border-color:var(--tx4)}
/* Retractable sidebar */
.sb.coll{width:46px}
.sb.coll .sb-lbl,.sb.coll .uc-info,.sb.coll .sb-extras{display:none!important}
.sb.coll .ni{justify-content:center;padding:7px 0}
.sb.coll .sb-h{justify-content:center}
.sb.coll .ni.act::before{display:none}
.sb-tog{background:none;border:none;cursor:pointer;color:var(--tx4);padding:4px;border-radius:5px;line-height:1;font-size:14px;transition:all .12s}
.sb-tog:hover{color:var(--tx1);background:var(--bg2)}
/* Avatar */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
/* Mobile bottom nav */
.mob-nav{display:none}
@media(max-width:680px){
  .sb{display:none}
  /* Safe area: Dynamic Island / notch */
  #app{padding-top:env(safe-area-inset-top,0px)}
  /* Bottom nav */
  .mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--bd);z-index:50;padding:3px 0 env(safe-area-inset-bottom,4px);overflow-x:auto;scrollbar-width:none}
  .mob-nav::-webkit-scrollbar{display:none}
  .mob-nav .ni{min-width:58px;flex:1;flex-direction:column;gap:2px;font-size:9px;padding:5px 3px;border-radius:0;justify-content:center;align-items:center;white-space:nowrap}
  .mob-nav .ni::before{display:none}
  .mob-nav .ni.act{background:none;color:var(--ac-l)}
  .mob-nav .ni svg{width:18px;height:18px;flex-shrink:0}
  /* Content */
  .mc{padding-bottom:calc(64px + env(safe-area-inset-bottom,0px))}
  .wrap{height:100dvh}
  .sec{padding:10px;gap:8px}
  .card{border-radius:10px}
  /* Grids: collapse 3/4 cols → 2 cols on mobile */
  .g2{grid-template-columns:1fr 1fr;gap:5px}
  .g3{grid-template-columns:1fr 1fr;gap:5px}
  .g4{grid-template-columns:1fr 1fr;gap:5px}
  /* Text safety */
  .card *{overflow-wrap:break-word;word-break:break-word}
  .cb{max-width:92%}
  body{font-size:13px}
  /* Onboarding */
  .ob{padding:10px;align-items:flex-start;padding-top:calc(env(safe-area-inset-top,0px) + 10px)}
  .ofrm{padding:14px}
  /* Login card */
  .login-card{padding:20px 16px!important}
}
/* Animations */
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes bn{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.2);opacity:1}}
@keyframes lvlPop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes updPulse{0%,100%{background:rgba(251,191,36,.08)}50%{background:rgba(251,191,36,.2)}}
@keyframes pageIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes barFill{from{width:0!important}to{}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes flashReq{0%{box-shadow:0 0 0 3px #f87171;background:rgba(248,113,113,.18)}30%{box-shadow:0 0 0 3px #f87171;background:rgba(248,113,113,.18)}100%{box-shadow:none;background:transparent}}
.flash-req{animation:flashReq .9s ease-out forwards !important;border-radius:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes countUp{from{transform:translateY(4px);opacity:0}to{transform:translateY(0);opacity:1}}
/* Clan role badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge-owner{background:rgba(251,191,36,.18);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.badge-admin{background:rgba(79,126,247,.18);color:var(--ac-l);border:1px solid rgba(79,126,247,.3)}
/* Streak calendar */
.scal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.scal-cell{height:14px;border-radius:3px;background:var(--bg3);transition:background .1s,outline .1s;cursor:default;position:relative}
.scal-cell:hover{outline:2px solid var(--ac);outline-offset:1px;z-index:1}
.scal-cell.today{outline:1px solid var(--tx4);outline-offset:1px}
.scal-cell.s0{background:var(--bg3)}
.scal-cell.s1{background:rgba(79,126,247,.25)}
.scal-cell.s2{background:rgba(79,126,247,.5)}
.scal-cell.s3{background:rgba(79,126,247,.75)}
.scal-cell.s4{background:var(--ac)}
/* Readiness score */
.rdy-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.rdy-ring svg{transform:rotate(-90deg)}
.rdy-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* Card hover glow */
.card{transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(79,126,247,.08);border-color:var(--bg3)}
/* Member row */
.gmember{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--bg1);transition:background .1s}
.gmember:hover{background:var(--bg2)}
.gmember:last-child{border-bottom:none}
/* Stat chip */
.schip{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;gap:2px}
.schip-v{color:var(--tx1);font-size:16px;font-weight:700;font-family:ui-monospace,monospace;line-height:1}
.schip-l{color:var(--tx5);font-size:10px}

.bc-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px}
.bc-frame{position:relative;width:min(320px,88vw);border-radius:14px;overflow:hidden;aspect-ratio:4/3;background:#111}
.bc-frame video{width:100%;height:100%;object-fit:cover}
.bc-reticle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:72%;height:45%;border:2px solid var(--ac);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.bc-hint{color:rgba(255,255,255,.75);font-size:12px;text-align:center;max-width:300px;line-height:1.5}
.bc-act{padding:7px 18px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:6px}
.pgrid-cell{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:var(--bg2);cursor:pointer}
.pgrid-cell img{width:100%;height:100%;object-fit:cover;display:block}
.pgrid-lbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.72));color:#fff;font-size:9px;padding:14px 4px 4px;text-align:center;line-height:1.3;white-space:pre-line}
.pgrid-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);border:none;color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
</style>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;background:var(--bg);color:var(--tx4);font-size:12px">Se încarcă...</div></div>
<script>
// Detect data: URL — Firebase and localStorage don't work in this context
if(location.protocol==='data:'||location.href.indexOf('data:text/html')===0){
  document.getElementById('app').innerHTML=[
    '<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;background:#09090e;padding:24px">',
    '<div style="max-width:360px;width:100%;background:#111118;border:1px solid #1e1e28;border-radius:16px;padding:28px;font-family:system-ui,sans-serif;text-align:center">',
    '<div style="font-size:36px;margin-bottom:12px">⚠️</div>',
    '<div style="color:#eceaff;font-size:16px;font-weight:700;margin-bottom:8px">Fișier deschis incorect</div>',
    '<div style="color:#7c7a9e;font-size:13px;line-height:1.6;margin-bottom:20px">',
    'Browserul a deschis fișierul ca <code style="color:#f97316;background:#18181f;padding:2px 5px;border-radius:4px">data: URL</code>, ',
    'ceea ce blochează salvarea datelor și Firebase.<br><br>',
    '<b style="color:#b8b4d8">Cum să deschizi corect:</b>',
    '</div>',
    '<div style="background:#18181f;border-radius:10px;padding:14px;text-align:left;margin-bottom:16px">',
    '<div style="color:#a78bfa;font-size:12px;font-weight:600;margin-bottom:8px">Opțiunea 1 — Direct în browser</div>',
    '<div style="color:#7c7a9e;font-size:11px">Apasă <b style="color:#eceaff">Ctrl+O</b> în browser → selectează <code style="color:#f97316">index.html</code></div>',
    '</div>',
    '<div style="background:#18181f;border-radius:10px;padding:14px;text-align:left;margin-bottom:16px">',
    '<div style="color:#a78bfa;font-size:12px;font-weight:600;margin-bottom:8px">Opțiunea 2 — Server local (recomandat)</div>',
    '<div style="color:#7c7a9e;font-size:11px">În terminal, în folderul fișierului:<br>',
    '<code style="color:#34d399;display:block;margin-top:4px;background:#09090e;padding:6px 8px;border-radius:6px">npx serve .</code></div>',
    '</div>',
    '<div style="color:#524f70;font-size:10px">Adresa va fi http://localhost:3000</div>',
    '</div></div>'
  ].join('');
  throw new Error('data: URL context — app cannot run here');
}
window.addEventListener('error',function(ev){
  if(String(ev.message).indexOf('localStorage')!==-1||String(ev.message).indexOf('data:')!==-1)return;
  var r=document.getElementById('app');
  if(r){var _em=String(ev.message).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');r.innerHTML='<div style="padding:22px;color:#f87171;font-family:monospace;font-size:12px;background:var(--bg);min-height:200px"><b>Eroare JS</b><br><br>'+_em+'<br>Linia: '+String(ev.lineno)+'</div>';}
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
'use strict';
var TODAY=new Date().toISOString().split('T')[0];
function getToday(){return new Date().toISOString().split('T')[0]}
var _ACT_N=[{id:'sedentar',label:'Sedentar',sub:'Birou, miscare minima',mult:1.2},{id:'usor',label:'Usor activ',sub:'1-3x/sapt.',mult:1.375},{id:'moderat',label:'Moderat activ',sub:'3-5x/sapt.',mult:1.55},{id:'activ',label:'Foarte activ',sub:'6-7x/sapt.',mult:1.725},{id:'extrem',label:'Extrem activ',sub:'Munca fizica + training zilnic',mult:1.9}];
var _ACT_B=[{id:'sedentar',label:'Cartof de canapea, tati',sub:'Stat pe loc, mișcare zero',mult:1.2},{id:'usor',label:'Mai ieși din casă, boss',sub:'1-3x/săpt., cam rar',mult:1.375},{id:'moderat',label:'Mișcare normală, frate',sub:'3-5x/săpt., merge',mult:1.55},{id:'activ',label:'Dai la fier serios, cocoș',sub:'6-7x/săpt., respect',mult:1.725},{id:'extrem',label:'Bestia din sală, tati!',sub:'Training + muncă fizică zilnic',mult:1.9}];
var ACT=_ACT_N;
var _GOALS_N=[{id:'pA',label:'Pierdere agresiva (-650 kcal)',delta:-650},{id:'p',label:'Pierdere de grasime (-400 kcal)',delta:-400},{id:'r',label:'Recompozitie (-100 kcal)',delta:-100},{id:'m',label:'Mentenanta',delta:0},{id:'mc',label:'Masa curata (+250 kcal)',delta:250},{id:'mb',label:'Masa / Bulking (+450 kcal)',delta:450}];

function _normTxt(s){return (s||'').toLowerCase().replace(/[ăâ]/g,'a').replace(/[îí]/g,'i').replace(/[șş]/g,'s').replace(/[țţ]/g,'t')}
// Reusable categorized, searchable multi-select for sports (onboarding + profile).
// `selected` is the live array (mutated via onToggle); openKey/qKey are S flags.
function mkSportMultiPicker(selected,openKey,qKey,onToggle){
  var wrap=el('div',{s:'margin-bottom:6px'});
  var open=!!S[openKey];
  var trig=el('button',{s:'width:100%;text-align:left;padding:9px 12px;border-radius:9px;border:1px solid '+(open?'var(--ac)':'var(--bd)')+';background:var(--bg2);font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px'});
  var trigTxt=el('span',{s:'color:'+(selected.length?'var(--tx1)':'var(--tx4)')+';font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'});
  trigTxt.textContent=selected.length?(selected.length+' '+(selected.length===1?'sport ales':'sporturi alese')):'Alege sporturi (caută)...';
  var trigArr=el('span',{s:'color:var(--tx4);font-size:10px'});trigArr.textContent=open?'▲':'▼';
  trig.appendChild(trigTxt);trig.appendChild(trigArr);
  trig.onclick=function(e){e.stopPropagation();S[openKey]=!S[openKey];render()};
  wrap.appendChild(trig);
  if(open){
    var dd=el('div',{s:'margin-top:5px;background:var(--bg1);border:1px solid var(--bd);border-radius:10px;max-height:300px;display:flex;flex-direction:column;overflow:hidden'});
    dd.onclick=function(e){e.stopPropagation()};
    var search=el('input',{c:'inp',id:'sp-multi-search',s:'margin:6px;width:calc(100% - 12px);box-sizing:border-box;font-size:12px',ph:'Caută sport...',val:S[qKey]||''});
    search.oninput=function(){S[qKey]=this.value;render()};
    dd.appendChild(search);
    var list=el('div',{s:'overflow-y:auto;flex:1'});
    var q=_normTxt(S[qKey]||'');var any=false;
    SPORTS_CATS.forEach(function(cat){
      var filtered=cat.sports.filter(function(sp){return !q||_normTxt(sp).indexOf(q)>-1});
      if(!filtered.length)return;any=true;
      var ch=el('div',{s:'font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx4);padding:7px 10px 2px;font-weight:600;position:sticky;top:0;background:var(--bg1)'});ch.textContent=cat.cat;list.appendChild(ch);
      filtered.forEach(function(sp){
        var on=selected.indexOf(sp)>-1;
        var si=el('div',{s:'padding:7px 11px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;color:'+(on?'var(--ac-l)':'var(--tx2)')+';background:'+(on?'var(--ac-glow)':'transparent')});
        var box=el('span',{s:'width:15px;height:15px;border-radius:4px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid '+(on?'var(--ac)':'var(--tx4)')+';background:'+(on?'var(--ac)':'transparent')});
        if(on){var ck=ic('check',10);ck.style.color='#fff';box.appendChild(ck);}
        var lab=el('span');lab.textContent=sp;
        si.appendChild(box);si.appendChild(lab);
        si.onmouseenter=function(){if(!on)this.style.background='var(--bg2)'};
        si.onmouseleave=function(){if(!on)this.style.background=''};
        si.onclick=function(){onToggle(sp);render()};
        list.appendChild(si);
      });
    });
    if(!any){var ne=el('div',{s:'padding:14px;text-align:center;color:var(--tx5);font-size:11px'});ne.textContent='Niciun sport găsit.';list.appendChild(ne);}
    dd.appendChild(list);wrap.appendChild(dd);
    document.addEventListener('click',function _c(){S[openKey]=false;render();document.removeEventListener('click',_c)},{once:true});
    setTimeout(function(){var si=document.getElementById('sp-multi-search');if(si)si.focus()},40);
  }
  if(selected.length){
    var chips=el('div',{s:'display:flex;flex-wrap:wrap;gap:4px;margin-top:7px'});
    selected.slice().forEach(function(sp){
      var chip=el('span',{s:'display:inline-flex;align-items:center;gap:5px;padding:3px 5px 3px 9px;border-radius:99px;background:var(--ac-glow);border:1px solid var(--ac);color:var(--ac-l);font-size:10px;white-space:nowrap'});
      chip.appendChild(document.createTextNode(sp));
      var x=el('button',{s:'background:none;border:none;color:var(--ac-l);cursor:pointer;font-size:13px;line-height:1;padding:0 2px'});x.textContent='×';
      x.onclick=function(e){e.stopPropagation();onToggle(sp);render();};
      chip.appendChild(x);chips.appendChild(chip);
    });
    wrap.appendChild(chips);
  }
  return wrap;
}

// Adaptive layer \u2014 learns from the user's logged nutrition, training and sleep.
function getNutritionInsights(s){
  s=s||S;var p=s.profile,m=s.metrics;var days=14;
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);var cIso=cutoff.toISOString().split('T')[0];
  var recent=(s.food||[]).filter(function(e){return e.date>=cIso});
  var byDay={};recent.forEach(function(e){(byDay[e.date]=byDay[e.date]||{c:0,p:0,f:0,h:0});byDay[e.date].c+=e.c||0;byDay[e.date].p+=e.p||0;byDay[e.date].f+=e.f||0;byDay[e.date].h+=e.h||0;});
  var loggedDays=Object.keys(byDay),nDays=loggedDays.length;
  var sum=loggedDays.reduce(function(a,d){a.c+=byDay[d].c;a.p+=byDay[d].p;a.h+=byDay[d].h;a.f+=byDay[d].f;return a;},{c:0,p:0,h:0,f:0});
  var avgKcal=nDays?Math.round(sum.c/nDays):0,avgProtein=nDays?Math.round(sum.p/nDays):0;
  var targetProtein=m&&m.macros?m.macros.prot:Math.round((p?p.weight:70)*1.8);
  var proteinGap=Math.max(0,targetProtein-avgProtein);
  var recentWk=(s.workouts||[]).filter(function(w){return w.date>=cIso});
  var wkPerWeek=+((recentWk.length/(days/7)).toFixed(1));
  var recentSleep=(s.sleepLog||[]).filter(function(e){return e.date>=cIso});
  var avgSleep=recentSleep.length?+(recentSleep.reduce(function(a,e){return a+(e.hours||0)},0)/recentSleep.length).toFixed(1):null;
  var poorSleep=avgSleep!==null&&avgSleep<6.5;
  var foodCount={};recent.forEach(function(e){foodCount[e.n]=(foodCount[e.n]||0)+1;});
  var topFoods=Object.keys(foodCount).sort(function(a,b){return foodCount[b]-foodCount[a]}).slice(0,5);
  var vegCount=recent.filter(function(e){return /salat|brocoli|broccoli|spanac|legum|varz|morcov|ardei|rosii|ro\u0219ii|castrav|conopid|fruct|mere|banan|afine|capsun/i.test(e.n)}).length;
  var lowVeg=nDays>=3&&(vegCount/Math.max(nDays,1))<1;
  return {days:days,loggedDays:nDays,avgKcal:avgKcal,avgProtein:avgProtein,targetProtein:targetProtein,proteinGap:proteinGap,wkPerWeek:wkPerWeek,avgSleep:avgSleep,poorSleep:poorSleep,topFoods:topFoods,lowVeg:lowVeg,logConsistency:Math.round(nDays/days*100),targetKcal:m?m.kcal:null};
}

function recommendSupps(p,ins){
  if(!p)return[];
  var scored=[];
  var diet=p.diet||'omnivor',goal=p.goal||'p',sex=p.sex,freq=+p.trainingFrequency||3;
  SUPPS.forEach(function(s){
    var score=0,reasons=[];
    if(s.id==='vitd'){score+=3;reasons.push('deficit frecvent, sus\u021Bine imunitatea \u0219i oasele');}
    if(s.id==='omega3'){score+=2;reasons.push('s\u0103n\u0103tate cardiovascular\u0103 \u0219i recuperare');}
    if(diet==='vegan'){if(s.id==='b12'){score+=6;reasons.push('esen\u021Bial \u00EEn dieta vegan\u0103');}if(s.id==='iron'){score+=2;reasons.push('risc crescut de deficit');}if(s.id==='calcium'){score+=2;reasons.push('aport redus de lactate');}if(s.id==='creatine'){score+=2;reasons.push('rezerve mai mici la vegani');}}
    if(diet==='vegetarian'&&s.id==='b12'){score+=3;reasons.push('aport limitat din diet\u0103');}
    if((goal==='mb'||goal==='mc'||goal==='r')&&s.id==='creatine'){score+=4;reasons.push('cel mai eficient pentru mas\u0103/for\u021B\u0103');}
    if((goal==='mb'||goal==='mc')&&s.id==='whey'){score+=2;reasons.push('ajut\u0103 surplusul proteic');}
    if((goal==='p'||goal==='pA')&&s.id==='whey'){score+=3;reasons.push('sa\u021Bietate \u0219i men\u021Binerea masei \u00EEn deficit');}
    if((goal==='p'||goal==='pA')&&s.id==='caffeine'){score+=2;reasons.push('energie \u0219i performan\u021B\u0103 \u00EEn deficit caloric');}
    if(freq>=4){if(s.id==='creatine'){score+=2;}if(s.id==='omega3'){score+=1;}if(s.id==='electrolytes'){score+=1;reasons.push('antrenezi des \u2014 pierderi prin transpira\u021Bie');}}
    if((p.preferredSports||[]).some(function(x){return /alergare|ciclism|inot|\u00EEnot|hiit|crossfit/i.test(x)})&&s.id==='betaalanine'){score+=1;reasons.push('anduran\u021B\u0103 muscular\u0103');}
    if(sex==='F'&&s.id==='iron'){score+=2;reasons.push('necesar crescut la femei');}
    if(ins&&ins.proteinGap>20&&(s.id==='whey')){score+=3;reasons.push('mediezi '+ins.avgProtein+'g protein\u0103 vs \u021Binta '+ins.targetProtein+'g');}
    if(ins&&ins.poorSleep&&(s.id==='magnesium'||s.id==='melatonin')){score+=2;reasons.push('somn sub optim recent');}
    if(score>0)scored.push({s:s,score:score,reason:reasons[0]||s.benefit});
  });
  scored.sort(function(a,b){var ev={A:3,B:2,C:1};return (b.score-a.score)||(ev[b.s.ev]-ev[a.s.ev])});
  return scored;
}

function authChangeCredentials(newUser,newPw,cb){
  var oldKey=_safeKey(S.authUser);var newKey=_safeKey(newUser);
  if(newUser===S.authUser){
    // password-only change
    RTDB.ref('accounts/'+oldKey+'/pwHash').set(_hashPw(newUser,newPw)).then(function(){
      if(S.loginRemember)_ls.set('dltate:session',JSON.stringify({username:newUser,pwHash:_hashPw(newUser,newPw)}));
      cb(null);
    }).catch(function(e){cb(e.message)});
    return;
  }
  RTDB.ref('accounts/'+newKey).get().then(function(exSnap){
    if(exSnap.exists()){cb('Numele de utilizator este deja folosit.');return;}
    // Read account + canonical user subtree so the identity migrates intact.
    Promise.all([RTDB.ref('accounts/'+oldKey).get(),RTDB.ref('users/'+oldKey).get()]).then(function(res){
      if(!res[0].exists()){cb('Cont negăsit.');return;}
      var rec=res[0].val();var userNode=res[1].val();
      var updates={};
      updates['accounts/'+newKey]=Object.assign({},rec,{username:newUser,pwHash:_hashPw(newUser,newPw)});
      updates['accounts/'+oldKey]=null;
      if(userNode){updates['users/'+newKey]=Object.assign({},userNode,{username:newUser});updates['users/'+oldKey]=null;}
      RTDB.ref().update(updates).then(function(){
        // Move clan membership to the new key (display name is unchanged).
        if(S.profile&&S.profile.gangCode){
          var gc=S.profile.gangCode;
          RTDB.ref('sh/gang/'+gc+'/'+oldKey).get().then(function(gs){
            if(gs.exists()){RTDB.ref('sh/gang/'+gc+'/'+newKey).set(gs.val()).then(function(){RTDB.ref('sh/gang/'+gc+'/'+oldKey).remove().catch(function(){})}).catch(function(){});}
          }).catch(function(){});
        }
        S.authUser=newUser;
        if(S.loginRemember)_ls.set('dltate:session',JSON.stringify({username:newUser,pwHash:_hashPw(newUser,newPw)}));
        cb(null);

    hint.textContent='Se analizeaza imaginea...';uploadBtn.disabled=true;

      var imgData=b64.split(',')[1];
      var prompt=mode==='sport'
        ?'Analizeaza acest screenshot de activitate sportiva. Extrage urmatoarele informatii in format JSON strict, fara explicatii suplimentare:\n{"sport":"<tipul sportului in romana, ex: Alergare, Ciclism, Mers>","duration":<durata in minute, numar intreg>,"kcal":<calorii arse, numar intreg sau null>,"distance":<distanta in km, numar zecimal sau null>,"note":"<observatie scurta sau \\"\\">"}. Daca nu gasesti o informatie, foloseste null.'
        :'Analizeaza aceasta imagine cu informatii nutritionale (eticheta, screenshot app, meniu etc). Extrage urmatoarele in format JSON strict:\n{"name":"<numele produsului/mesei>","kcal":<calorii la 100g sau per portie, numar intreg>,"protein":<proteine g, numar intreg>,"fat":<grasimi g, numar intreg>,"carbs":<carbohidrati g, numar intreg>,"qty":<cantitate in grame daca e vizibila sau null>}. Daca nu gasesti o valoare, pune null.';

      .then(function(r){return r.json()})

        var txt=(resp.content&&resp.content[0]&&resp.content[0].text)||'';

        if(!jsonMatch){hint.textContent='Nu am reusit sa extrag datele. Incearca cu o imagine mai clara.';uploadBtn.disabled=false;return;}

}

function addXP(reason,amt){
  var prevLvl=getLvl().n;
  S.xpLog=S.xpLog||[];
  S.xpLog.push({date:TODAY,reason:reason,amt:amt});
  if(S.xpLog.length>500)S.xpLog=S.xpLog.slice(-500);
  DB.save('xpLog',S.xpLog);
  var newLvl=getLvl().n;
  if(newLvl!==prevLvl){S.newLevel=newLvl;}
  // publish XP (total + weekly/monthly) to global + clan leaderboard
  publishXP();
}

// Structured chat renderer — turns plain text with newlines into well-spaced
// paragraphs, headings and bullet/numbered lines so replies never look cramped.
function renderChatBody(box,raw){
  while(box.firstChild)box.removeChild(box.firstChild);
  var text=safe(raw||'');
  var lines=text.split('\n');var prevBlank=false;
  lines.forEach(function(ln){
    var t=ln.trim();
    if(!t){prevBlank=true;return;}
    var isBullet=/^(?:[•–•\-]|\d+[.)])\s+/.test(t);
    var isHeading=/:$/.test(t)&&t.length<64&&!isBullet;
    var first=box.childNodes.length===0;
    var d=el('div',{s:'line-height:1.55'+(first?'':';margin-top:'+(prevBlank?'9px':'2px'))+(isBullet?';padding-left:14px;text-indent:-12px':'')+(isHeading?';font-weight:600;color:var(--tx1)':'')});
    d.textContent=t;box.appendChild(d);prevBlank=false;
  });
  if(!box.childNodes.length)box.textContent=text;
}
