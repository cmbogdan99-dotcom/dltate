.ni{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;cursor:pointer;border:none;background:none;color:var(--tx4);font-size:11px;width:100%;text-align:left;font-family:inherit}
.ni:hover{background:var(--bg1);color:var(--tx3)}

.uc:hover{background:var(--bg1)}
.mc{flex:1;overflow-y:auto;min-width:0}
.sec{padding:14px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:11px;overflow:hidden}
.cp{padding:13px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:7px 11px;color:var(--tx1);font-size:12px;outline:none;font-family:inherit}
.inp:focus{border-color:#16a34a}
.inp::placeholder{color:var(--tx5)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit}
.bp{background:#16a34a;color:#fff}.bp:hover{background:#22c55e}.bp:disabled{opacity:.3;cursor:not-allowed}

.bf{height:100%;border-radius:99px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.iw{position:relative}
.iu{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--tx4);font-size:10px;pointer-events:none}
.ob{min-height:840px;display:flex;align-items:center;justify-content:center;padding:14px}
.oc{width:100%;max-width:410px}
.opr{display:flex;gap:3px;margin-bottom:13px}
.opb{height:3px;flex:1;border-radius:99px;background:var(--bg2)}
.opb.dn{background:#4ade80}
.ofrm{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:18px}
.tg{display:flex;background:var(--bg2);border-radius:7px;padding:2px;gap:2px}
.tb{padding:4px 10px;border-radius:5px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;color:var(--tx4)}
.tb.ac{background:var(--bg3);color:var(--tx1)}
.ach{border-radius:10px;padding:11px;display:flex;align-items:flex-start;gap:9px;border:1px solid}
.ach.lk{border-color:var(--bd);background:var(--bg1);opacity:.5}
.ach.ul{border-color:#fbbf24;background:rgba(251,191,36,.06)}
.chal{border-radius:9px;padding:10px;border:1px solid var(--bd);background:var(--bg1)}
.chal.done{border-color:#34d399;background:rgba(52,211,153,.04)}
.fi{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:6px;cursor:pointer}
.fi:hover{border-color:var(--tx5)}
.cm{display:flex;margin-bottom:7px}
.cm.u{justify-content:flex-end}
.cb{max-width:84%;padding:8px 11px;border-radius:11px;font-size:12px;line-height:1.5;white-space:pre-wrap}
.cb.u{background:#16a34a;color:#fff;border-bottom-right-radius:2px}
.cb.a{background:var(--bg1);border:1px solid var(--bd);color:var(--tx2);border-bottom-left-radius:2px}
.ci{flex:1;background:var(--bg1);border:1px solid var(--bg3);border-radius:8px;padding:8px 11px;color:var(--tx1);font-size:12px;outline:none;font-family:inherit}
.ci:focus{border-color:#16a34a}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;animation:bn 1s infinite ease}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
.wqb{padding:5px 9px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);cursor:pointer;font-size:10px;font-family:inherit;color:#38bdf8;font-weight:500}
.wqb:hover{border-color:#38bdf8}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes bn{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.2);opacity:1}}

function getMonday(){var d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff)).toISOString().split('T')[0]}

function cntHyd(s){var days={};(s.waterLog||[]).forEach(function(e){days[e.date]=(days[e.date]||0)+e.amt});return Object.values(days).filter(function(v){return v>=2000}).length}
function cntHyd7(s){var m=getMonday();var days={};(s.waterLog||[]).filter(function(e){return e.date>=m}).forEach(function(e){days[e.date]=(days[e.date]||0)+e.amt});return Object.values(days).filter(function(v){return v>=2000}).length}
function gPct(s){if(!s.profile||!s.progress||!s.progress.length)return 0;var f=s.progress[0].weight,cur=s.progress[s.progress.length-1].weight,tgt=s.profile.targetWeight,gd=f-tgt;if(gd<=0)return 0;return Math.min(100,Math.round(((f-cur)/gd)*100))}

  nH:function(h){var v=Number(h);if(!v||isNaN(v))return 170; if(v<3) return v*100; if(v>50) return v; return v},

  navyBF:function(sex,h,neck,waist,hip){try{h=Calc.nH(h);neck=Number(neck);waist=Number(waist);hip=hip!==undefined?Number(hip):null; if(!h||isNaN(h))return null; if(sex==='M'){ if(!neck||!waist) return null; var diff=waist-neck; if(diff<=0) return null; var bf=495/(1.0324-0.19077*Math.log10(diff)+0.15456*Math.log10(h))-450 } else { if(!neck||!waist||!hip) return null; var sum=waist+hip-neck; if(sum<=0) return null; var bf=495/(1.29579-0.35004*Math.log10(sum)+0.22100*Math.log10(h))-450 } if(!isFinite(bf)||bf<3||bf>65) return null; return +(bf.toFixed(1))}catch(e2){return null}},
  calTgt:function(tdee,gid){var g=GOALS.filter(function(x){return x.id===gid})[0]||GOALS[1];return Math.round(tdee+g.delta)},
  macros:function(kcal,lbm,gid,did){var pr={pA:2.4,p:2.2,r:2.2,m:1.6,mc:1.8,mb:1.8};var prot=Math.round(lbm*(pr[gid]||1.8));var fp=did==='keto'?.7:did==='lowCarb'?.4:.28;var fat=Math.max(Math.round(kcal*fp/9),Math.round(lbm*0.4));var carbs=Math.max(0,Math.round((kcal-prot*4-fat*9)/4));return{prot:prot,fat:fat,carbs:carbs}},
  wGoal:function(p){var g=Math.round((+p.weight)*33);if(+p.trainingFrequency>=4)g+=500;return Math.min(Math.max(g,1500),4000)},
  getM:function(p){
    var h=Calc.nH(p.height),_bfIn=(p.bodyFat!==undefined&&p.bodyFat!==null&&p.bodyFat!=='')?+p.bodyFat:null,bf=_bfIn!==null?_bfIn:Calc.navyBF(p.sex,h,p.neck,p.waist,p.hip);
